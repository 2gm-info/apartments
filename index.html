<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strandveien 112 Infoskjerm</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #000428, #004e92);
    color: white;
    overflow: hidden;
}

.container {
    height: 100vh;
    width: 100vw;
    position: relative;
}

.page {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    padding: 12px;
    box-sizing: border-box;
}

.page.active {
    display: block;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: 120px auto 70px;
    height: 100%;
    gap: 12px;
}

.header {
    grid-column: span 3;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 2.2em;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 30px rgba(0,150,255,0.5);
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 25px rgba(0,200,255,0.3);
    position: relative;
    overflow: hidden;
}

.card-content { position: relative; z-index: 2; }

.big { font-size: 2.5em; font-weight: bold; color: #00ffff; }
.clock { font-size: 1.5em; }

.footer {
    grid-column: span 3;
    background: black;
    border-radius: 15px;
    display: flex;
    align-items: center;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,255,255,0.4);
}

.ticker {
    white-space: nowrap;
    font-size: 1.4em;
    padding-left: 100%;
    animation: scroll 25s linear infinite;
}

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* BILDE-SIDE */
.slideshow {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
}

.slide {
    flex: 1;
    display: none;
}

.slide.active { display: block; }

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 20px;
}

</style>
</head>

<body>

<div class="container">

    <!-- SIDE 1 (INFO) -->
    <div class="page active">
        <div class="grid">
            <div class="header">
                <div>Strandveien 112</div>
                <div class="clock" id="clock"></div>
            </div>

            <div class="card"><div class="card-content"><h2>WiFi</h2><div class="big">SV112_Gjest</div><div>Passord: 12345678</div></div></div>
            <div class="card"><div class="card-content"><h2>Kontakt</h2><div class="big">+47 000 00 000</div></div></div>
            <div class="card"><div class="card-content"><h2>Utsjekk</h2><div class="big">12:00</div></div></div>

            <div class="card"><div class="card-content"><h2>Vask</h2><div class="big">Man / Ons / Fre</div></div></div>
            <div class="card"><div class="card-content"><h2>Regler</h2><div class="big">Ingen røyking</div></div></div>
            <div class="card"><div class="card-content"><h2>Status</h2><div class="big">ALT OK</div></div></div>

            <div class="footer">
                <div class="ticker">🔔 Velkommen &nbsp; | &nbsp; 📶 WiFi: SV112_Gjest &nbsp; | &nbsp; 🚭 Røyking forbudt &nbsp; | &nbsp; 📞 Kontakt ved behov</div>
            </div>
        </div>
    </div>

    <!-- SIDE 2 (BILDER) -->
    <div class="page">
        <div class="slideshow">
            <div class="slide active"><img src="https://picsum.photos/1920/1080?1"></div>
            <div class="slide"><img src="https://picsum.photos/1920/1080?2"></div>
            <div class="slide"><img src="https://picsum.photos/1920/1080?3"></div>
        </div>
    </div>

</div>

<script>
// KLOKKE
function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

// SIDE ROTASJON (10 sek)
let pages = document.querySelectorAll('.page');
let currentPage = 0;

setInterval(() => {
    pages[currentPage].classList.remove('active');
    currentPage = (currentPage + 1) % pages.length;
    pages[currentPage].classList.add('active');
}, 10000);

// BILDE ROTASJON (5 sek internt)
let slides = document.querySelectorAll('.slide');
let currentSlide = 0;

setInterval(() => {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
}, 5000);

</script>

</body>
</html>

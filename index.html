<script>

async function loadWeather(){

const url="https://api.open-meteo.com/v1/forecast?latitude=69.2296&longitude=17.9811&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto"

const res=await fetch(url)
const data=await res.json()

document.getElementById("tempNow").innerText =
Math.round(data.current_weather.temperature)+"°C"

document.getElementById("wind").innerText =
data.current_weather.windspeed+" km/h"

let forecastHTML=""

for(let i=0;i<7;i++){

forecastHTML+=`
<div class="day">
<div class="day-name">${data.daily.time[i].slice(5)}</div>
<div class="day-icon">☁️</div>
<div class="day-temp">
${Math.round(data.daily.temperature_2m_max[i])}° /
${Math.round(data.daily.temperature_2m_min[i])}°
</div>
</div>
`

}

document.getElementById("forecast").innerHTML=forecastHTML

}

loadWeather()

</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>Infoskjerm</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:1920px;
    height:1080px;
    position:relative;
}

#clock{
    position:absolute;
    top:40px;
    right:60px;
    font-size:60px;
}

#ticker{
    position:absolute;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
    font-size:28px;
}
</style>
</head>

<body>

<div class="container">

<div id="clock"></div>

<div id="ticker">
Manager Mobil: 99 10 10 41 – Wifi: dittnett / passord
</div>

</div>

<script>
function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString('no-NO');
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
